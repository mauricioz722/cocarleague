<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoCar League</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C8A600;
  --black: #111111;
  --bg: #F2F1ED;
  --white: #ffffff;
  --border: #E4E3DF;
  --text: #111111;
  --muted: #666;
  --light: #F8F7F4;
  --green: #16a34a;
  --red: #dc2626;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 12px 32px;
  display: flex; align-items: center; gap: 4px;
}
.brand-logo {
  width: 36px; height: 36px; background: var(--gold);
  border-radius: 8px; display: flex; align-items: center;
  justify-content: center; font-size: 13px; font-weight: 800; color: #fff;
}
.brand-name { font-size: 15px; font-weight: 700; color: var(--text); }

/* NAV */
.nav {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 32px; display: flex;
}
.nav-btn {
  padding: 11px 20px; font-size: 12px; font-weight: 600;
  color: var(--muted); background: none; border: none;
  border-bottom: 2px solid transparent; cursor: pointer;
  font-family: 'Inter', sans-serif;
}
.nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

/* MAIN */
.main { padding: 16px 32px 28px; max-width: 1400px; margin: 0 auto; }

/* PAGE HEADERS */
.page-header {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
}
.page-title { font-size: 18px; font-weight: 700; color: var(--text); }
.page-controls { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }

.fg { display: flex; flex-direction: column; gap: 3px; }
.fg label { font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: .5px; text-transform: uppercase; }
.fg select {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text);
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
  padding: 7px 10px; cursor: pointer; outline: none; min-width: 110px;
}
.fg select:focus { border-color: var(--gold); }

/* ── LIGA PAGE ── */
.liga-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* Division tabs */
.div-tabs { display: flex; gap: 4px; margin-bottom: 14px; }
.div-tab {
  padding: 6px 16px; font-size: 12px; font-weight: 600;
  border-radius: 6px; border: 1px solid var(--border);
  background: var(--white); color: var(--muted);
  cursor: pointer; font-family: 'Inter', sans-serif;
}
.div-tab.active { background: var(--black); color: #fff; border-color: var(--black); }

/* Standings card */
.card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
}
.card-header {
  padding: 16px 20px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.card-title { font-size: 11px; font-weight: 700; color: var(--text); letter-spacing: .5px; text-transform: uppercase; }
.card-meta { font-size: 11px; color: var(--muted); }

.standings-table { 
  width: 100%; 
  border-collapse: collapse; 
  table-layout: fixed;
}
.standings-table th:nth-child(1),
.standings-table td:nth-child(1) {
  width: 7%;
}

.standings-table th:nth-child(2),
.standings-table td:nth-child(2) {
  width: 27%;
}

.standings-table th:nth-child(3),
.standings-table td:nth-child(3) {
  width: 9%;
}

.standings-table th:nth-child(4),
.standings-table td:nth-child(4) {
  width: 10%;
}

.standings-table th:nth-child(5),
.standings-table td:nth-child(5),
.standings-table th:nth-child(6),
.standings-table td:nth-child(6),
.standings-table th:nth-child(7),
.standings-table td:nth-child(7) {
  width: 8%;
}

.standings-table th:nth-child(8),
.standings-table td:nth-child(8),
.standings-table th:nth-child(9),
.standings-table td:nth-child(9) {
  width: 11%;
}
.standings-table th {
  font-size: 11px; font-weight: 700; color: var(--muted);
  letter-spacing: .4px; text-transform: uppercase;
  padding: 10px 12px; text-align: center;
  border-bottom: 1px solid var(--border);
}
.standings-table th:nth-child(2) { text-align: left; }
.standings-table td {
  padding: 10px 12px; font-size: 12px;
  color: #555; border-bottom: 1px solid var(--light);
  text-align: center; vertical-align: middle;
}
.standings-table td:nth-child(2) { text-align: left; }
.standings-table tr:last-child td { border-bottom: none; }
.standings-table tr:hover td { background: var(--light); }

.pos-badge {
  width: 24px; height: 24px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
}
.pos-1 { background: var(--gold); color: #fff; }
.pos-2 { background: #e8e8e8; color: #555; }
.pos-3 { background: #f0d9b5; color: #7a5c00; }
.pos-other {
  width: 24px; height: 24px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  background: var(--bg);
  color: var(--muted);
  border: 1px solid var(--border);
}
.pos-asc-dark { background: #16a34a; color: #fff; }
.pos-asc { background: #4ade80; color: #14532d; }
.pos-rel { background: #ef4444; color: #fff; }
.pos-rel-dark { background: #7f1d1d; color: #fff; }

.pts-cell { font-weight: 700; color: var(--text); font-size: 13px; }
.diff-pos { color: var(--green); font-weight: 600; }
.diff-neg { color: var(--red); font-weight: 600; }
.fraction { color: #555; font-size: 12px; font-weight: 400; }

/* Fixture */
.fixture-wrap { display: flex; flex-direction: column; gap: 14px; }
.fecha-block { }
.fecha-header {
  display: flex; align-items: center; gap: 10px;
  padding: 0 4px; margin-bottom: 8px;
}
.fecha-num {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--black); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.fecha-label { font-size: 13px; font-weight: 600; color: var(--text); }
.fecha-status {
  margin-left: auto; font-size: 12px; font-weight: 600;
  color: var(--green); display: flex; align-items: center; gap: 4px;
}
.fecha-status.pending { color: #dc6b6b; }

.match-row {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px;
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: 12px; margin-bottom: 6px;
}
.match-row:last-child { margin-bottom: 0; }
.match-pair { font-size: 13px; font-weight: 500; color: var(--text); }
.match-pair.right { text-align: right; font-size: 13px; }
.match-score {
  font-size: 12px; font-weight: 700; color: var(--text);
  background: var(--bg); padding: 4px 10px;
  border-radius: 6px; text-align: center; white-space: nowrap;
  min-width: 80px;
}
.match-pending {
  font-size: 11px; color: var(--muted);
  display: flex; align-items: center; gap: 4px;
  justify-content: center;
}

/* ── H2H PAGE ── */
.h2h-filters {
  display: flex; gap: 10px; flex-wrap: wrap;
  background: var(--white); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 18px;
  margin-bottom: 14px; align-items: flex-end;
}
.h2h-filters-title { font-size: 11px; font-weight: 700; color: var(--muted); margin-right: 6px; align-self: center; letter-spacing: .3px; text-transform: uppercase; }

.player-row { display: grid; grid-template-columns: 1fr 210px 1fr; gap: 12px; margin-bottom: 12px; }
.player-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; position: relative; }
.player-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--gold); }
.player-card.right::before { background: var(--black); }
.pc-inner { padding: 20px 18px; display: flex; align-items: center; gap: 14px; }
.player-card.right .pc-inner { flex-direction: row-reverse; }
.player-card.right .pi { text-align: right; }
.player-card.right .srow { justify-content: flex-end; }
.avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 3px solid var(--border); flex-shrink: 0; background: var(--bg); }
.avatar-placeholder { width: 80px; height: 80px; border-radius: 50%; background: var(--bg); border: 3px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: var(--gold); }
.pi h2 { font-size: 26px; font-weight: 800; color: var(--text); line-height: 1; margin-bottom: 5px; }
.badge { display: inline-block; background: var(--gold); color: #fff; font-size: 9px; font-weight: 700; padding: 2px 9px; border-radius: 4px; margin-bottom: 10px; }
.badge.dark { background: var(--black); color: #fff; }
.srow { display: flex; gap: 20px; }
.sm { display: flex; flex-direction: column; gap: 1px; }
.sm .lb { font-size: 9px; color: var(--muted); }
.sm .vl { font-size: 18px; font-weight: 700; color: var(--text); }
.sm .vl.green { color: var(--green); }
.sm .vl.red { color: var(--red); }
.center-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 18px 10px; text-align: center; position: relative; }
.center-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--border); border-radius: 14px 14px 0 0; }
.tm-lbl { font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: .8px; text-transform: uppercase; }
.tm-num { font-size: 58px; font-weight: 800; color: var(--text); line-height: 1.05; }
.h2h-tag { background: var(--text); color: var(--white); font-size: 8px; font-weight: 700; padding: 3px 12px; border-radius: 4px; margin: 5px 0 7px; letter-spacing: .5px; }
.h2h-sc { display: flex; align-items: flex-start; gap: 12px; }
.h2h-col { display: flex; flex-direction: column; align-items: center; }
.h2h-n { font-size: 26px; font-weight: 800; line-height: 1; color: var(--text); }
.h2h-n.gold { color: var(--gold); }
.h2h-sub { font-size: 9px; color: var(--muted); margin-top: 2px; }
.h2h-vs { font-size: 10px; color: var(--muted); margin-top: 9px; }

.metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.mc { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; }
.mc-title { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: .6px; text-transform: uppercase; margin-bottom: 14px; }
.mc-vals { display: flex; justify-content: space-between; align-items: flex-end; }
.mv { display: flex; flex-direction: column; }
.mv.r { align-items: flex-end; }
.mv .n { font-size: 38px; font-weight: 800; color: var(--text); line-height: 1; }
.mv .n.gold { color: var(--gold); }
.mv .l { font-size: 10px; color: var(--muted); margin-top: 2px; }
.mbar { height: 4px; border-radius: 2px; margin-top: 14px; display: flex; overflow: hidden; background: var(--bg); }
.mbar-y { background: var(--gold); transition: width .4s ease; }
.mbar-k { background: #111; transition: width .4s ease; }

.hist { background: var(--white); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; }
.hist-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; }
.hist-line { width: 32px; height: 2px; background: var(--gold); border-radius: 2px; margin-bottom: 16px; }
.hist-table { width: 100%; border-collapse: collapse; }
.hist-table th { font-size: 9px; font-weight: 700; color: var(--muted); letter-spacing: .4px; text-transform: uppercase; padding: 0 10px 10px; text-align: left; border-bottom: 1px solid var(--border); }
.hist-table td { padding: 11px 10px; font-size: 12px; color: #555; border-bottom: 1px solid var(--light); vertical-align: middle; }
.hist-table tr:last-child td { border-bottom: none; }
.hist-table tr:hover td { background: var(--light); }
.winner-badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; background: var(--gold); color: #fff; white-space: nowrap; }
.winner-badge.dark { background: var(--black); color: #fff; }

.no-data { text-align: center; color: var(--muted); padding: 40px 0; font-size: 13px; }
.loading { text-align: center; color: var(--muted); padding: 60px 0; font-size: 13px; }
.foot { text-align: center; color: #070707; font-size: 10px; padding: 18px 0 6px; }

/* ── RANK PAGE ── */
.rank-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}

.rank-table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

.rank-table th {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: .4px;
  text-transform: uppercase;
  padding: 10px 10px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.rank-table td {
  padding: 11px 10px;
  font-size: 13px;
  color: #555;
  border-bottom: 1px solid var(--light);
  text-align: center;
  vertical-align: middle;
  font-weight: 400;
}

.rank-table tr:last-child td {
  border-bottom: none;
}

.rank-table tr:hover td {
  background: var(--light);
}

.rank-table th:nth-child(1),
.rank-table td:nth-child(1) {
  width: 10%;
}

.rank-table th:nth-child(2),
.rank-table td:nth-child(2) {
  width: 38%;
  text-align: left;
}

.rank-table th:nth-child(3),
.rank-table td:nth-child(3) {
  width: 18%;
}

.rank-table th:nth-child(4),
.rank-table td:nth-child(4) {
  width: 17%;
}

.rank-table th:nth-child(5),
.rank-table td:nth-child(5) {
  width: 12%;
}
.rank-table th:nth-child(6),
.rank-table td:nth-child(6) {
  width: 12%;
}

.rank-pos {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 800;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
}

.rank-pos.top1 {
  background: var(--gold);
  color: #fff;
  border-color: var(--gold);
}

.rank-pos.top2 {
  background: #e8e8e8;
  color: #555;
}

.rank-pos.top3 {
  background: #f0d9b5;
  color: #7a5c00;
}

.rank-player {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.rank-player-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}

.rank-player-initials {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  background: var(--bg);
  border: 2px solid var(--border);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 800;
  color: var(--gold);
  flex-shrink: 0;
}

.rank-score {
  font-size: 14px;
  font-weight: 800;
  color: var(--text);
}

.div-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 28px;
  padding: 3px 8px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 700;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
}

.rank-compact {
  font-size: 12px;
  color: #555;
  white-space: nowrap;
}

.rank-record {
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}
.rank-racha-w { display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:#dcfce7;color:#166534; }
.rank-racha-l { display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:#fee2e2;color:#991b1b; }
.rank-div-sub { font-size:11px;color:var(--muted);margin-top:1px; }
.rank-top3 td { background:var(--light); }
/* Coming soon */
.coming-soon { text-align: center; padding: 80px 0; color: var(--muted); font-size: 14px; }

@media (max-width: 900px) {
  .liga-layout { grid-template-columns: 1fr; }
  .main { padding: 14px 16px 24px; }
  .nav { padding: 0 16px; }
  .header { padding: 12px 16px; }
}
@media (max-width: 600px) {
  .player-row { grid-template-columns: 1fr; }
  .metrics { grid-template-columns: 1fr; }
  .standings-table th { font-size: 8px; padding: 6px 4px; letter-spacing: 0; }
  .standings-table td { font-size: 11px; padding: 7px 4px; }
  .standings-table td:nth-child(2) { font-size: 12px; }
  .fraction { font-size: 10px; }
  .pos-badge { width: 20px; height: 20px; font-size: 9px; }
  .card-header { padding: 12px 14px 10px; }
}
@media (min-width: 601px) {
  .player-row { grid-template-columns: 1fr 180px 1fr; }
  .metrics { grid-template-columns: 1fr 1fr 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <img src="assets/logo-lig.png" alt="LIG" style="height:75px;width:auto;display:block;">
  <div class="brand-name" style="display:flex;align-items:center;gap:3px;transform:translateY(6px);">
    <span style="font-weight:400;font-size:13px;">by</span>
    <img src="assets/logo-nondata.png.png" alt="Nondata" style="height:50px;width:auto;display:block;transform:translateY(1px);">
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('liga')">Liga</button>
  <button class="nav-btn" onclick="showPage('h2h')">H2H</button>
  <button class="nav-btn" onclick="showPage('stats')">LIG Stats</button>
  <button class="nav-btn" onclick="showPage('rank')">LIG Rank</button>
  <button class="nav-btn" onclick="showPage('jugadores')">LIG Players</button>
</nav>

<div class="main">
  <div id="page-liga"><div class="loading">Cargando...</div></div>
  <div id="page-h2h" style="display:none"><div class="loading">Cargando...</div></div>
  <div id="page-stats" style="display:none"><div class="coming-soon">Próximamente</div></div>
  <div id="page-rank" style="display:none"><div class="coming-soon">Próximamente</div></div>
  <div id="page-jugadores" style="display:none"><div class="coming-soon">Próximamente</div></div>
</div>

<script>
const SHEET_ID = '1bTdib3kxhcTXVJlqGuySkcZPpb3NPu7ZFHhV45B_1EI';
const API = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

let allStandings = [], allFixtures = [], allMatches = [], players = [], h2hSummary = [], rankRows = [];
let currentDiv = 'A', currentLiga = 'Cocar26A';
let activePage = 'liga';

async function fetchSheet(sheet) {
  const res = await fetch(`${API}&sheet=${encodeURIComponent(sheet)}`);
  const text = await res.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
  const cols = json.table.cols.map(c => c.label);
  return json.table.rows.map(r => { const o = {}; cols.forEach((c,i) => o[c] = r.c[i] ? r.c[i].v : null); return o; });
}

function ini(n) { return n ? n.replace(/\./g,'').substring(0,2).toUpperCase() : '?'; }
function rc(r) { return !r ? '' : r.startsWith('W') ? 'green' : 'red'; }
function bar(ia, ib, a, b) {
  const t=a+b, pa=t?Math.round(a/t*100):50;
  const ea=document.getElementById(ia), eb=document.getElementById(ib);
  if(ea) ea.style.width=pa+'%'; if(eb) eb.style.width=(100-pa)+'%';
}
function avHTML(url, name, borderColor) {
  const bc = borderColor || 'var(--border)';
  if (url && url.startsWith('http'))
    return `<img class="avatar" src="${url}" alt="${name}" style="border-color:${bc}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="avatar-placeholder" style="display:none;border-color:${bc}">${ini(name)}</div>`;
  return `<div class="avatar-placeholder" style="border-color:${bc}">${ini(name)}</div>`;
}
function avHTMLA(url, name) { return avHTML(url, name, 'var(--gold)'); }
function avHTMLB(url, name) { return avHTML(url, name, 'var(--black)'); }

// ── SHOW PAGE ──
function showPage(page) {
  ['liga','h2h','stats','rank','jugadores'].forEach(p => {
    document.getElementById('page-'+p).style.display = p===page ? '' : 'none';
  });
  document.querySelectorAll('.nav-btn').forEach((btn,i) => {
    btn.classList.toggle('active', ['liga','h2h','stats','rank','jugadores'][i]===page);
  });
  activePage = page;
  if (page==='liga') renderLiga();
if (page==='h2h') renderH2H();
if (page==='rank') renderRank();
}

// ── LIGA PAGE ──
function renderLiga() {
  const standings = allStandings
    .filter(r => r.league_id === currentLiga && r.division === currentDiv)
    .sort((a,b) => (b.pts||0)-(a.pts||0) || (b.diff_games||0)-(a.diff_games||0));
  const fixtures = allFixtures.filter(r => r.league_id === currentLiga && r.division === currentDiv);

  // Group fixtures by fecha
  const fechaMap = {};
  fixtures.forEach(m => {
    const f = m.fecha || '?';
    if (!fechaMap[f]) fechaMap[f] = [];
    fechaMap[f].push(m);
  });
  const fechas = Object.keys(fechaMap).sort((a,b) => a-b);

  const ligaLabel = currentLiga === 'Cocar26A' ? 'Cocar 26A · En curso' : 'Cocar 25 · Historial';
  const isLive = currentLiga === 'Cocar26A';

  document.getElementById('page-liga').innerHTML = `
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:12px;">
  <img src="assets/logo-cocar.png.jpg" style="width:54px;height:54px;object-fit:cover;border-radius:50%;display:block;">
  <div>
    <div class="page-title">Cocar League</div>
    <div style="font-size:11px;color:var(--muted);margin-top:2px;">Clasificación y fixture por división</div>
  </div>
</div>
    </div>

    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
      ${['A','B','C','D'].map(d => `<button class="div-tab ${d===currentDiv?'active':''}" onclick="currentDiv='${d}';renderLiga()">Div ${d}</button>`).join('')}
     <div style="width:3px;height:24px;background:var(--border);margin:0 4px;"></div>
      <select onchange="currentLiga=this.value;renderLiga()" style="background:#fff;border:1.5px solid var(--border);font-size:12px;font-weight:600;padding:6px 12px;border-radius:6px;cursor:pointer;outline:none;color:var(--text);">
        <option value="Cocar26A" ${currentLiga==='Cocar26A'?'selected':''}>Cocar 26A ${isLive?'· Live':''}</option>
        <option value="Cocar25" ${currentLiga==='Cocar25'?'selected':''}>Cocar 25</option>
      </select>
    </div>

    <div style="font-size:10px;color:var(--muted);margin-bottom:12px;letter-spacing:.3px;text-transform:uppercase;">${currentLiga} · División ${currentDiv} ${isLive?'· <span style="color:var(--green)">● En curso</span>':''}</div>

    <div class="liga-layout">
      <div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">Clasificación</span>
            <span class="card-meta">${standings.length} jugadores</span>
          </div>
          <table class="standings-table">
            <thead>
              <tr>
                <th>#</th><th style="text-align:left">Jugador</th>
                <th style="color:var(--text);font-size:11px">PTS</th>
                <th style="font-size:11px">Dif G</th>
                <th>PJ</th><th>PG</th><th>PP</th><th>Sets</th><th>Games</th>
              </tr>
            </thead>
            <tbody>
              ${standings.length===0?`<tr><td colspan="9" style="text-align:center;padding:20px;color:var(--muted)">Sin datos</td></tr>`:
              standings.map(r => {
                const pos = r.pos || 0;
                const div = currentDiv;
                let posEl;
                if (div === 'A') {
                  // Division A: medals top 3, red bottom 2
                  if (pos===1) posEl=`<span class="pos-badge pos-1">${pos}</span>`;
                  else if (pos===2) posEl=`<span class="pos-badge pos-2">${pos}</span>`;
                  else if (pos===3) posEl=`<span class="pos-badge pos-3">${pos}</span>`;
                  else if (pos===7) posEl=`<span class="pos-badge pos-rel">${pos}</span>`;
                  else if (pos===8) posEl=`<span class="pos-badge pos-rel-dark">${pos}</span>`;
                  else posEl=`<span class="pos-other">${pos}</span>`;
                } else if (div === 'D') {
                  // Division D: green top 2, no relegation
                  if (pos===1) posEl=`<span class="pos-badge pos-asc-dark">${pos}</span>`;
                  else if (pos===2) posEl=`<span class="pos-badge pos-asc">${pos}</span>`;
                  else posEl=`<span class="pos-other">${pos}</span>`;
                } else {
                  // Divisions B, C: green top 2, red bottom 2
                  if (pos===1) posEl=`<span class="pos-badge pos-asc-dark">${pos}</span>`;
                  else if (pos===2) posEl=`<span class="pos-badge pos-asc">${pos}</span>`;
                  else if (pos===7) posEl=`<span class="pos-badge pos-rel">${pos}</span>`;
                  else if (pos===8) posEl=`<span class="pos-badge pos-rel-dark">${pos}</span>`;
                  else posEl=`<span class="pos-other">${pos}</span>`;
                }
                const diff = r.diff_games || 0;
                const diffEl = diff>0?`<span class="diff-pos">+${diff}</span>`:
                               diff<0?`<span class="diff-neg">${diff}</span>`:
                               `<span style="color:var(--muted)">0</span>`;
                return `<tr>
                  <td>${posEl}</td>
                  <td style="font-weight:600;color:var(--text);text-align:left;font-size:13px;">${r.player||'—'}</td>
                  <td style="font-size:14px;font-weight:800;color:var(--text)">${r.pts||0}</td>
                 <td style="font-size:12px;font-weight:400">${diffEl}</td>
                  <td>${r.pj||0}</td>
                  <td>${r.pg||0}</td>
                  <td>${r.pp||0}</td>
                  <td><span class="fraction">${r.sets_g||0}/${r.sets_p||0}</span></td>
                  <td><span class="fraction">${r.games_g||0}/${r.games_p||0}</span></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <div>
        <div class="card">
          <div class="card-header">
            <span class="card-title">Fixture & Resultados</span>
            <span class="card-meta">${fechas.length} fechas</span>
          </div>
          <div style="padding:16px;">
            ${fechas.length===0?'<div class="no-data">Sin partidos</div>':
            fechas.map(f => {
              const matches = fechaMap[f];
              const played = matches.filter(m => m.score_display).length;
              const allPlayed = played === matches.length;
              const nonePlayed = played === 0;
              const statusEl = allPlayed
                ? `<span class="fecha-status">✓ Completada</span>`
                : nonePlayed
                ? `<span class="fecha-status pending">Por jugar</span>`
                : `<span class="fecha-status pending">${played}/${matches.length} jugados</span>`;
              return `<div class="fecha-block" style="margin-bottom:16px;">
                <div class="fecha-header">
                  <span class="fecha-label">Fecha ${f}</span>
                  ${statusEl}
                </div>
                ${matches.map(m => {
                  const played = !!m.score_display;
                  return `<div class="match-row">
                    <div class="match-pair">${m.pair1_display||'—'}</div>
                    ${played
                      ? `<div class="match-score">${m.score_display}</div>`
                      : `<div class="match-pending">⏱ Pendiente</div>`
                    }
                    <div class="match-pair right">${m.pair2_display||'—'}</div>
                  </div>`;
                }).join('')}
              </div>`;
            }).join('')}
          </div>
        </div>
      </div>
    </div>
    <div class="foot">© 2026 LIG · Powered by NonData&Co</div>
  `;
}

// ── H2H PAGE ──
function renderH2H() {
  const names = [...new Set(players.map(p => p.player_name).filter(Boolean))].sort();
  const selA = document.getElementById('h2h-sA');
  const selB = document.getElementById('h2h-sB');
  const a = selA ? selA.value : names[0];
  const b = selB ? selB.value : names[1];
  const sT = document.getElementById('h2h-sT') ? document.getElementById('h2h-sT').value : 'all';
  const sD = document.getElementById('h2h-sD') ? document.getElementById('h2h-sD').value : 'all';

  const sum = h2hSummary.find(r => (r.player_a===a&&r.player_b===b)||(r.player_a===b&&r.player_b===a)) || {};
  const rev = sum.player_a===b;
  const pA = players.find(p => p.player_name===a) || {};
  const pB = players.find(p => p.player_name===b) || {};
  const mA=rev?(sum.matches_b||0):(sum.matches_a||0), mB=rev?(sum.matches_a||0):(sum.matches_b||0);
  const sA=rev?(sum.sets_b||0):(sum.sets_a||0), sB2=rev?(sum.sets_a||0):(sum.sets_b||0);
  const gA=rev?(sum.games_b||0):(sum.games_a||0), gB=rev?(sum.games_a||0):(sum.games_b||0);

  const fl = allMatches.filter(m => {
    if (m.player_a!==a||m.player_b!==b) return false;
    if (sT!=='all'&&m.temporada!==sT) return false;
    if (sD!=='all'&&m.division!==sD) return false;
    return true;
  });

  const optionsHTML = names.map(n => `<option value="${n}">${n}</option>`).join('');

  document.getElementById('page-h2h').innerHTML = `
    <div class="h2h-filters">
      <span class="h2h-filters-title">Comparar</span>
      <div class="fg"><label>Jugador 1</label><select id="h2h-sA" onchange="renderH2H()">${optionsHTML}</select></div>
      <div class="fg"><label>Jugador 2</label><select id="h2h-sB" onchange="renderH2H()">${optionsHTML}</select></div>
      <div class="fg"><label>Temporada</label><select id="h2h-sT" onchange="renderH2H()"><option value="all">Todas</option><option value="Cocar25">Liga 25</option><option value="Cocar26A">Liga 26A</option></select></div>
      <div class="fg"><label>División</label><select id="h2h-sD" onchange="renderH2H()"><option value="all">Todas</option><option value="A">A</option><option value="B">B</option><option value="C">C</option><option value="D">D</option></select></div>
    </div>

    <div class="player-row">
      <div class="player-card"><div class="pc-inner">
        ${avHTMLA(pA.photo_url||'',a)}
        <div class="pi">
          <h2>${a}</h2>
          <div class="badge">División ${pA.division_actual||'—'}</div>
          <div class="srow">
            <div class="sm"><span class="lb">Ranking</span><span class="vl">${pA.rank_position||'—'}°</span></div>
            <div class="sm"><span class="lb">Racha Actual</span><span class="vl ${rc(pA.racha_actual)}">${pA.racha_actual||'—'}</span></div>
          </div>
        </div>
      </div></div>

      <div class="center-card">
        <div class="tm-lbl">TOTAL MATCH</div>
        <div class="tm-num">${mA+mB}</div>
        <div class="h2h-tag">H2H GLOBAL</div>
        <div class="h2h-sc">
          <div class="h2h-col"><span class="h2h-n gold">${mA}</span><span class="h2h-sub">${a}</span></div>
          <span class="h2h-vs">vs</span>
          <div class="h2h-col"><span class="h2h-n">${mB}</span><span class="h2h-sub">${b}</span></div>
        </div>
      </div>

      <div class="player-card right"><div class="pc-inner">
        ${avHTMLB(pB.photo_url||'',b)}
        <div class="pi">
          <h2>${b}</h2>
          <div class="badge dark">División ${pB.division_actual||'—'}</div>
          <div class="srow">
            <div class="sm" style="align-items:flex-end"><span class="lb">Ranking</span><span class="vl">${pB.rank_position||'—'}°</span></div>
            <div class="sm" style="align-items:flex-end"><span class="lb">Racha Actual</span><span class="vl ${rc(pB.racha_actual)}">${pB.racha_actual||'—'}</span></div>
          </div>
        </div>
      </div></div>
    </div>

    <div class="metrics">
      <div class="mc"><div class="mc-title">Matches</div><div class="mc-vals"><div class="mv"><div class="n gold">${mA}</div><div class="l">${a}</div></div><div class="mv r"><div class="n">${mB}</div><div class="l">${b}</div></div></div><div class="mbar"><div class="mbar-y" id="bmA" style="width:50%"></div><div class="mbar-k" id="bmB" style="width:50%"></div></div></div>
      <div class="mc"><div class="mc-title">Sets</div><div class="mc-vals"><div class="mv"><div class="n gold">${sA}</div><div class="l">${a}</div></div><div class="mv r"><div class="n">${sB2}</div><div class="l">${b}</div></div></div><div class="mbar"><div class="mbar-y" id="bsA" style="width:50%"></div><div class="mbar-k" id="bsB" style="width:50%"></div></div></div>
      <div class="mc"><div class="mc-title">Games</div><div class="mc-vals"><div class="mv"><div class="n gold">${gA}</div><div class="l">${a}</div></div><div class="mv r"><div class="n">${gB}</div><div class="l">${b}</div></div></div><div class="mbar"><div class="mbar-y" id="bgA" style="width:50%"></div><div class="mbar-k" id="bgB" style="width:50%"></div></div></div>
    </div>

    <div class="hist">
      <div class="hist-title">Historial de enfrentamientos</div>
      <div class="hist-line"></div>
      ${fl.length===0?'<div class="no-data">Sin partidos entre estos jugadores con los filtros seleccionados</div>':`
      <table class="hist-table">
        <thead><tr>
          <th>Temporada</th><th style="text-align:center">Div</th><th style="text-align:center">Fecha</th>
          <th>Pareja 1</th><th>Pareja 2</th>
          <th style="text-align:center">Resultado</th><th style="text-align:center">Ganador</th>
        </tr></thead>
        <tbody>${fl.map(m => {
          const aIsA=m.player_a===a, aWins=m.winner_h2h===a;
          const p1=aIsA?m.pair_a_display:m.pair_b_display;
          const p2=aIsA?m.pair_b_display:m.pair_a_display;
          return `<tr>
            <td>${m.temporada||m.campeonato||'—'}</td>
            <td style="text-align:center">${m.division||'—'}</td>
            <td style="text-align:center">F${m.fecha_liga||'?'}</td>
            <td>${p1}</td><td>${p2}</td>
            <td style="text-align:center;font-weight:600;color:var(--text)">${m.score_display_perspective||'—'}</td>
            <td style="text-align:center"><span class="winner-badge ${aWins?'':'dark'}">${m.winner_h2h||'—'}</span></td>
          </tr>`;
        }).join('')}</tbody>
      </table>`}
    </div>
    <div class="foot">© 2026 LIG · Powered by NonData&Co</div>
  `;

  // Restore selects
  if (document.getElementById('h2h-sA')) document.getElementById('h2h-sA').value = a;
  if (document.getElementById('h2h-sB')) { document.getElementById('h2h-sB').value = b; }
  if (document.getElementById('h2h-sT')) document.getElementById('h2h-sT').value = sT;
  if (document.getElementById('h2h-sD')) document.getElementById('h2h-sD').value = sD;

  setTimeout(()=>{ bar('bmA','bmB',mA,mB); bar('bsA','bsB',sA,sB2); bar('bgA','bgB',gA,gB); },50);
}

// ── RANK PAGE ──
function renderRank() {
  const rows = [...rankRows].sort((a,b) => (a.rank_position||999) - (b.rank_position||999));

  function fmtPoints(v) {
    const n = Number(v || 0);
    return Math.round(n).toLocaleString('es-CL');
  }

  function playerPhotoHTML(playerName) {
  const p = players.find(x => x.player_name === playerName || x.player === playerName) || {};
  const url = p.photo_url || '';
  const div = p.division_actual || p['division_actual'] || p['división_actual'] || '';

  const avatarHTML = (url && String(url).startsWith('http'))
    ? `
      <img class="rank-player-avatar" src="${url}" alt="${playerName}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='inline-flex'">
      <span class="rank-player-initials" style="display:none;">${ini(playerName)}</span>
    `
    : `
      <span class="rank-player-initials">${ini(playerName)}</span>
    `;

  return `
    ${avatarHTML}
    <div style="display:flex;flex-direction:column;gap:4px;">
      <span style="font-size:13px;font-weight:600;color:var(--text)">${playerName}</span>
      <span class="badge" style="display:inline-block;width:fit-content;margin:0;">División ${div || '—'}</span>
    </div>
  `;
}

  function rachaHTML(playerName) {
    const p = players.find(x => x.player_name === playerName || x.player === playerName) || {};
    const racha = p.racha_actual || '';
    if (!racha) return '—';
    const cls = racha.startsWith('W') ? 'rank-racha-w' : 'rank-racha-l';
    return `<span class="${cls}">${racha}</span>`;
  }

  document.getElementById('page-rank').innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">LIG Rank</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">
          Últimos 14 partidos · ponderado por división
        </div>
      </div>
    </div>

    <div class="rank-card">
      <div class="card-header">
        <span class="card-title" style="font-size:10px;letter-spacing:.4px;">Ranking Last 14</span>
        <span class="card-meta">${rows.length} jugadores</span>
      </div>

      <table class="rank-table">
        <thead>
          <tr>
            <th>#</th>
            <th style="text-align:left">Jugador</th>
            <th>Puntos</th>
            <th>PJ</th>
            <th>V-D</th>
            <th>Racha</th>
          </tr>
        </thead>
        <tbody>
          ${rows.length===0 ? `
            <tr><td colspan="6" style="text-align:center;padding:24px;color:var(--muted);">Sin datos de ranking</td></tr>
          ` : rows.map(r => {
            const pos = Number(r.rank_position || 0);
            let posClass = '';
            if (pos===1) posClass='top1';
            else if (pos===2) posClass='top2';
            else if (pos===3) posClass='top3';

            const wins = Number(r.g2||0) + Number(r.g3||0);
            const losses = Number(r.p3||0) + Number(r.p2||0);
            const pjRank = `${r.matches_counted||0}/${r.matches_played||0}`;
            const record = `${wins}-${losses}`;
            const isTop3 = pos <= 3;

            return `
              <tr class="${isTop3?'rank-top3':''}">
                <td><span class="rank-pos ${posClass}">${pos}</span></td>
                <td>
                  <span class="rank-player">
                    ${playerPhotoHTML(r.player||'')}
                  </span>
                </td>
                <td><span class="rank-score">${fmtPoints(r.score_last14)}</span></td>
                <td style="font-size:12px;color:var(--muted)">${pjRank}</td>
                <td><span class="rank-record">${record}</span></td>
                <td>${rachaHTML(r.player||'')}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    </div>
    <div class="foot">© 2026 LIG · Powered by NonData&Co</div>
  `;
}
// ── INIT ──
async function init() {
  try {
    const [standings, fixtures, matches, playerRows, summaryRows, rankingRows] = await Promise.all([
  fetchSheet('division_standings'),
  fetchSheet('division_fixtures'),
  fetchSheet('app_h2h_matches'),
  fetchSheet('app_players'),
  fetchSheet('app_h2h_summary'),
  fetchSheet('ranking_last14')
]);
    allStandings = standings;
allFixtures = fixtures;
allMatches = matches;
players = playerRows;
h2hSummary = summaryRows;
rankRows = rankingRows;
renderLiga();
  } catch(err) {
    document.getElementById('page-liga').innerHTML = `<div class="loading">Error al cargar datos.<br><small>${err.message}</small></div>`;
  }
}
init();
</script>
</body>
</html>
